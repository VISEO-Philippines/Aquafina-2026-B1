<template>
    <!-- <lightning-card variant="Narrow"> -->
        <!-- <div class="slds-var-m-around_medium"> -->
        <template lwc:if={quote}>
            <div lwc:if={isWithApproval}>
            <template lwc:if={isDraft}>
                <div class="slds-scoped-notification slds-media slds-media_center slds-theme_warning" role="status">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="utility:warning" variant="inverse" size="small"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <p><strong>Warning:</strong> Approval is required before this Quote can be synced.</p>
                    </div>
                </div>
            </template>

            <template lwc:if={isInReview}>
                <div class="slds-scoped-notification slds-media slds-media_center slds-theme_info" role="status">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="utility:info" variant="inverse" size="small"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <p><strong>Information:</strong> This Quote is currently being reviewed by the manager.</p>
                    </div>
                </div>
            </template>

            <template lwc:if={isApproved}>
                <div class="slds-scoped-notification slds-media slds-media_center slds-theme_success" role="status">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="utility:success" variant="inverse" size="small"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <p><strong>Success:</strong> This Quote has been approved and is ready for the next stage (Presented). You may email this approved quote to the client using the Email Quote to Client Action at the top of the page or Log a Call Tab below this stub. After emailing or logging a call, you may proceed to the Presented Stage by clicking the Presented chevron at the top.</p>
                    </div>
                </div>
            </template>

            <template lwc:if={isRejected}>
                <div class="slds-scoped-notification slds-media slds-media_center slds-theme_error" role="status">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="utility:error" variant="inverse" size="small"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <p><strong>Error:</strong> This Quote has been rejected and requires updates before re-submission.</p>
                    </div>
                </div>
            </template>
        </div>
        <template lwc:if={isAutoApproved}>
            <div class="slds-scoped-notification slds-media slds-media_center slds-theme_success" role="status">
                <div class="slds-media__figure">
                    <lightning-icon icon-name="utility:success" variant="inverse" size="small"></lightning-icon>
                </div>
                <div class="slds-media__body">
                    <p><strong>Success:</strong> This Quote has been automatically approved as it falls below the discount threshold. It is ready for the next stage (Presented). You may notify the client of this approved quote using the Email Quote to Client Action at the top or Log a Call Tab below this stub. After emailing or logging a call, you may proceed to the Presented Stage by clicking the Presented chevron at the top.</p>
                </div>
            </div>
        </template>
        </template>
        <template lwc:else>
            <p>Loading Quote Data...</p>
        </template>
    <!-- </lightning-card> -->

</template>
