<template>
    <div class="slds-card-wrapper">
        <!-- Heading -->
        <div class="flexbox" id="heading">
            <div>
                <h1>Deal Summary</h1>
                <p class="deal-summary-p-padding"  >Provides a brief overview on {opportunityName} including a concise view of its <span class="c-blue-text">related account, quote, and pricing.</span> </p>
            </div>
        </div>
        <!-- <hr/> -->

        <div class="slds-grid slds-m-vertical_large justify-center" >
            <div class="slds-col slds-p-around_large slds-size_1-of-3 border">
                <div class="flexbox" id="customer-subheading">
                    <lightning-icon icon-name="standard:account" size="larger" alternative-text="standard price books icon"></lightning-icon>
                    <h2>Customer/ Deal Context</h2>
                </div>
                <div>
                    <p>
                        Account: <a class="dotted-underline" href={accountUrl} ><strong>{accountName}</strong></a>
                    </p>
                    <!-- <p>Customer Type: <strong>{customerType}</strong></p> -->
                     <p>
                        <lightning-formatted-text label="Customer Type" value='Customer Type: ' ></lightning-formatted-text>
                        <strong>
                            <lightning-formatted-text label="Customer Type Value" value={customerType} ></lightning-formatted-text>
                        </strong>
                     </p>
                    <p>Business Type: <strong>{opportunityType}</strong> </p>
                    <p>Opportunity: <strong>{opportunityName}</strong></p>
                    <p>Stage: <strong>{opportunityStage}</strong></p>
                    <p>Close Date: <strong>{opportunityCloseDate}</strong></p>
                    <p>Effective Deal Discount: <strong>{effectiveDealDiscount} %</strong></p>
                </div>
            </div>
            <div class="slds-col slds-m-left_xx-small slds-p-around_large slds-size_1-of-3 border">
                <div class="flexbox" id="quotes-subheading">
                    <lightning-icon icon-name="standard:quotes" size="larger" alternative-text="standard price books icon"></lightning-icon>
                    <h2>Quote Details</h2>
                </div>
                <div>
                    <p>Quote: <a class="dotted-underline" href={quoteUrl} ><strong>{quoteName}</strong></a></p>
                    <p>Quote Number: <strong>{quoteNumber}</strong></p>
                    <p>Number of line items: <strong>{lineItemNumber}</strong></p>
                    <p>Expiration Date: <strong>{ExpirationDate}</strong></p>
                    <p>Synced: <strong>{isSynced}</strong></p>
                    <p>Status: <strong>{quoteStatus}</strong></p>
                </div>
            </div>
            <div class="slds-col slds-m-left_xx-small slds-p-around_large slds-size_1-of-3 border">
                <div class="flexbox" id="pricing-subheading">
                    <lightning-icon icon-name="standard:price_books" size="larger" alternative-text="standard price books icon"></lightning-icon>
                    <h2>Pricing</h2>
                </div>
                <div>
                    <p>Items Ordered: <a class="dotted-underline" href={quoteLineItemsUrl} ><strong>Quote Line Items</strong></a></p>
                    <p>Amount (Net): <strong>{netAmount}</strong></p>
                    <p>VAT Amount (20%): <strong>{vat}</strong></p>
                    <p>Total Amount (Net + VAT): <strong>{totalAmount}</strong></p>
                </div>
            </div>
        </div>

        <template if:true={hasQli} >
            <!-- Pricing Card -->
            <div class="flexbox" id="pricing-subheading2">
                <h3>Product Breakdown</h3>
            </div>
            <lightning-datatable
                class="slds-table_header-hidden" 
                key-field="id"
                data={data}
                columns={columns}
                hide-checkbox-column
                >
            </lightning-datatable>
        </template>

    </div>
</template>
